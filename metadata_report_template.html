<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metadata Report</title>
  <style>
    :root[data-theme="dark"] { --bg:#0b0f1a; --bg-top:#131f38; --panel:#12192b; --panel-alt:#18233d; --line:#243352; --text:#e8f0ff; --muted:#95a7cd; --accent:#4ea1ff; --accent2:#ffcf4e; --ok:#47d18c; --warn:#ff9458; --control-bg:#0e1527; --thead-bg:#141f36; --row-border:#1f2a44; --row-hover:#121f38; --row-text:#d7e5ff; --sep:#3f567f; --pill-border:#3562a5; --pill-bg:#102244; --pill-text:#7cb0ff; --pill-on-bg:#4ea1ff; --pill-on-text:#ffffff; --pill-on-border:#7cb0ff; --toggle-on-bg:#1d3f70; --toggle-on-text:#d7e9ff; --toggle-on-border:#5a93d6; --flag-warn-bg:#3a1f00; --flag-warn-border:#6b3800; --flag-bad-bg:#2a0010; --flag-bad-border:#6b0028; --flag-info-bg:#001d3a; --flag-info-border:#1a4a7a; --overlay:rgba(6,10,18,.82); --details-pre:#0b1222; }
    :root[data-theme="light"] { --bg:#eef3fb; --bg-top:#ffffff; --panel:#ffffff; --panel-alt:#f4f8ff; --line:#cad7ea; --text:#1b2a40; --muted:#5f7393; --accent:#1f6fd6; --accent2:#ad7a00; --ok:#197a52; --warn:#b1541d; --control-bg:#f8fbff; --thead-bg:#edf3fc; --row-border:#d9e4f3; --row-hover:#f2f7ff; --row-text:#243853; --sep:#93a8c6; --pill-border:#8eb0dc; --pill-bg:#e9f1ff; --pill-text:#295fa8; --pill-on-bg:#1f6fd6; --pill-on-text:#ffffff; --pill-on-border:#1f6fd6; --toggle-on-bg:#d9e9ff; --toggle-on-text:#174b8f; --toggle-on-border:#7ea7db; --flag-warn-bg:#fff1e3; --flag-warn-border:#e1ba89; --flag-bad-bg:#ffe8ef; --flag-bad-border:#db95ab; --flag-info-bg:#e7f1ff; --flag-info-border:#9eb8de; --overlay:rgba(24,35,56,.45); --details-pre:#f4f8ff; }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top right,var(--bg-top) 0%,var(--bg) 44%);color:var(--text);font-family:Consolas,'Segoe UI',sans-serif}
    .wrap{max-width:1600px;margin:20px auto;padding:0 20px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .title{font-size:30px;font-weight:700;letter-spacing:.06em}.title span{color:var(--accent2)}.meta{color:var(--muted);font-size:13px}
    .cards{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px;margin-bottom:12px}.card{background:linear-gradient(180deg,var(--panel-alt),var(--panel));border:1px solid var(--line);border-radius:10px;padding:12px;min-height:86px}
    .card .num{font-size:34px;line-height:1;font-weight:700}.card .lbl{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .filters{display:grid;gap:12px;margin-bottom:12px}.control{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px}
    .control label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}input,select{width:100%;background:var(--control-bg);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:14px}
    .filter-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.toolbar-lib{display:flex;align-items:center;gap:8px}.toolbar-search{flex:1;min-width:280px}.toolbar-btn{width:auto;padding:8px 14px;background:var(--control-bg);border:1px solid var(--line);color:var(--text);border-radius:8px;cursor:pointer;font-size:12px}
    .filter-strip{display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-width:100%}.filter-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.group-label{color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.04em}.group-sep{color:var(--sep)}
    .group-toggle{border:1px solid var(--pill-border);background:var(--pill-bg);color:var(--pill-text);border-radius:999px;padding:6px 10px;font-size:11px;cursor:pointer;user-select:none;min-width:44px;text-align:center}.group-toggle.on{background:var(--toggle-on-bg);color:var(--toggle-on-text);border-color:var(--toggle-on-border)}.group-toggle.off{opacity:.6}
    .filter-pills{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.filter-pill{border:1px solid var(--pill-border);background:var(--pill-bg);color:var(--pill-text);border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;user-select:none}.filter-pill.on{background:var(--pill-on-bg);color:var(--pill-on-text);border-color:var(--pill-on-border)}.filter-pill.off{opacity:.4}
    .pill-row{display:flex;flex-wrap:wrap;gap:6px}.pill{border:1px solid var(--pill-border);background:var(--pill-bg);color:var(--pill-text);border-radius:999px;padding:4px 10px;font-size:12px;cursor:pointer;user-select:none}.pill.off{opacity:.45}
    .control-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .table-shell{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel)}.table-caption{padding:10px 12px;border-bottom:1px solid var(--line);color:var(--muted);font-size:13px}
    table{width:100%;border-collapse:collapse}thead th{background:var(--thead-bg);color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em;text-align:left;padding:10px;border-bottom:1px solid var(--line);position:sticky;top:0}
    tbody td{border-bottom:1px solid var(--row-border);padding:9px 10px;font-size:13px;vertical-align:top;color:var(--row-text)}tbody tr:hover{background:var(--row-hover)}.row-click{cursor:pointer}.mono{font-family:Consolas,monospace}.muted{color:var(--muted)}.tag{color:var(--accent)}.hdr-yes{color:var(--accent2);font-weight:700}.hdr-no{color:var(--muted)}.table-scroll{max-height:70vh;overflow:auto}
    thead th.sortable{cursor:pointer;user-select:none;white-space:nowrap}thead th.sort-asc::after{content:' ↑'}thead th.sort-desc::after{content:' ↓'}
    .flag{display:inline-block;border-radius:4px;padding:1px 5px;font-size:11px;margin:1px 2px;white-space:nowrap;font-family:Consolas,monospace}.flag-warn{background:var(--flag-warn-bg);color:var(--warn);border:1px solid var(--flag-warn-border)}.flag-bad{background:var(--flag-bad-bg);color:#ff6b8a;border:1px solid var(--flag-bad-border)}.flag-info{background:var(--flag-info-bg);color:var(--accent);border:1px solid var(--flag-info-border)}
    .col-chooser{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:12px}.col-chooser label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}.col-pills{display:flex;flex-wrap:wrap;gap:6px}.col-pill{border:1px solid var(--pill-border);background:var(--pill-bg);color:var(--pill-text);border-radius:999px;padding:4px 10px;font-size:12px;cursor:pointer;user-select:none}.col-pill.off{opacity:.35;text-decoration:line-through}
    .details-overlay{position:fixed;inset:0;background:var(--overlay);display:flex;justify-content:center;align-items:center;padding:20px;z-index:2000}.details-overlay.hidden{display:none}.details-panel{width:min(1100px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,var(--panel-alt),var(--panel));border:1px solid var(--line);border-radius:12px}.details-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line)}.details-title{font-size:16px;font-weight:700;color:var(--text)}.details-close{background:var(--control-bg);color:var(--text);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:20px;line-height:1;padding:2px 10px}.details-body{padding:12px 14px}.details-grid{display:grid;grid-template-columns:180px 1fr;gap:6px 12px;margin-bottom:12px}.details-k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}.details-v{color:var(--text);font-size:13px;word-break:break-word}.details-label{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin:8px 0 6px}.details-pre{margin:0;padding:10px;background:var(--details-pre);border:1px solid var(--line);border-radius:8px;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:280px;overflow:auto}
    .search-wrap{position:relative}.search-wrap input{padding-right:30px}.search-clear{display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;outline:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0 4px;border-radius:4px}.search-clear:hover{color:var(--text)}.search-wrap.has-value .search-clear{display:block}
    @media (max-width:1300px){.cards{grid-template-columns:repeat(3,minmax(120px,1fr))}}
  </style>
</head>
<body>
<div class="wrap"><div class="topbar"><div class="title">MEDIA<span>AUDIT</span></div><div style="display:flex;align-items:center;gap:10px"><button id="themeToggle" class="toolbar-btn" type="button">Theme: Dark</button><div class="meta"><!-- REPORT_META --></div></div></div>
<div class="cards" id="cards"></div>
<div class="filters">
<div class="control">
  <div class="filter-toolbar">
    <div class="toolbar-lib"><span class="group-label">LIBRARY</span><select id="libraryFilter" style="min-width:180px;width:auto"><option value="">All Libraries</option></select><span class="group-sep">|</span><span class="group-label">SEARCH</span></div>
    <div class="toolbar-search"><div class="search-wrap"><input id="search" placeholder="Search filename, path, codec..." /><button class="search-clear" id="searchClear" type="button" title="Clear">&times;</button></div></div>
    <span class="group-sep">|</span>
    <input id="resetBtn" class="toolbar-btn" type="button" value="Reset" />
    <span class="group-sep">|</span>
    <select id="hdr" style="min-width:120px;width:auto"><option value="">All HDR</option><option value="yes">HDR only</option><option value="no">SDR only</option></select>
    <span class="group-sep">|</span>
    <input id="minWidth" type="number" min="0" step="100" placeholder="Min width" style="width:110px" />
    <span class="group-sep">|</span>
    <div class="filter-strip">
      <div class="filter-group"><span class="group-label">Ext</span><button id="extToggle" class="group-toggle off" type="button">○ OFF</button><div id="extFilters" class="filter-pills"></div></div>
      <span class="group-sep">|</span>
      <div class="filter-group"><span class="group-label">Type</span><button id="mediaTypeToggle" class="group-toggle off" type="button">○ OFF</button><div id="mediaTypeFilters" class="filter-pills"></div></div>
      <span class="group-sep">|</span>
      <div class="filter-group"><span class="group-label">Video</span><button id="videoToggle" class="group-toggle off" type="button">○ OFF</button><div id="videoFilters" class="filter-pills"></div></div>
      <span class="group-sep">|</span>
      <div class="filter-group"><span class="group-label">Audio</span><button id="audioToggle" class="group-toggle off" type="button">○ OFF</button><div id="audioFilters" class="filter-pills"></div></div>
    </div>
  </div>
</div>
<div class="control control-row">
  <div style="flex:1;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px">
    <button id="exportBtn" type="button" style="padding:6px 12px;background:var(--control-bg);border:1px solid var(--line);color:var(--text);border-radius:8px;cursor:pointer">Export CSV</button>
    <span class="group-sep">|</span>
    <label style="margin:0;color:var(--muted);display:flex;gap:4px;align-items:center"><input type="checkbox" id="qualityColsToggle" style="margin:0" />Quality columns</label>
    <span class="group-sep">|</span>
    <label style="margin:0;color:var(--muted);display:flex;gap:4px;align-items:center"><input type="checkbox" id="showDupesToggle" style="margin:0" />Show duplicates</label>
  </div>
  <span class="group-sep">|</span>
  <div style="display:flex;gap:8px;align-items:center">
    <label class="filter-cat-label" style="margin:0">Columns:</label>
    <div id="colPills" class="filter-pills" style="flex:1;min-width:250px"></div>
  </div>
</div>
<div class="table-shell"><div class="table-caption" id="caption">Loading&hellip;</div><div class="table-scroll"><table><thead><tr id="tableHead"></tr></thead><tbody id="rows"></tbody></table></div></div>
</div>
<div class="details-overlay hidden" id="detailsOverlay"><div class="details-panel"><div class="details-head"><div class="details-title" id="detailsTitle">Entry details</div><button class="details-close" id="detailsClose" type="button" title="Close details">&times;</button></div><div class="details-body"><div class="details-grid" id="detailsGrid"></div><label class="details-label">Tags</label><pre class="details-pre" id="detailsTags"></pre><label class="details-label">Raw JSON</label><pre class="details-pre" id="detailsRaw"></pre></div></div></div>
<script>
const rowsEl=document.getElementById('rows'),cardsEl=document.getElementById('cards'),captionEl=document.getElementById('caption');
const libraryEl=document.getElementById('libraryFilter'),searchEl=document.getElementById('search'),searchClearEl=document.getElementById('searchClear'),hdrEl=document.getElementById('hdr'),minWidthEl=document.getElementById('minWidth'),resetBtn=document.getElementById('resetBtn');
const detailsOverlayEl=document.getElementById('detailsOverlay'),detailsTitleEl=document.getElementById('detailsTitle'),detailsGridEl=document.getElementById('detailsGrid'),detailsTagsEl=document.getElementById('detailsTags'),detailsRawEl=document.getElementById('detailsRaw'),detailsCloseEl=document.getElementById('detailsClose');
const tableHeadEl=document.getElementById('tableHead'),colPillsEl=document.getElementById('colPills');
const videoFiltersEl=document.getElementById('videoFilters'),audioFiltersEl=document.getElementById('audioFilters'),extFiltersEl=document.getElementById('extFilters'),mediaTypeFiltersEl=document.getElementById('mediaTypeFilters');
const videoToggleEl=document.getElementById('videoToggle'),audioToggleEl=document.getElementById('audioToggle'),extToggleEl=document.getElementById('extToggle'),mediaTypeToggleEl=document.getElementById('mediaTypeToggle');
const exportBtn=document.getElementById('exportBtn'),qualColsToggle=document.getElementById('qualityColsToggle'),showDupesToggle=document.getElementById('showDupesToggle');
const themeToggleEl=document.getElementById('themeToggle');
const THEME_KEY='metadata_report_theme';
const setTheme=t=>{const theme=t==='light'?'light':'dark';document.documentElement.setAttribute('data-theme',theme);themeToggleEl.textContent=`Theme: ${theme==='dark'?'Dark':'Light'}`;try{localStorage.setItem(THEME_KEY,theme);}catch(_){}};
let initialTheme='dark';
try{initialTheme=localStorage.getItem(THEME_KEY)||'dark';}catch(_){initialTheme='dark';}
setTheme(initialTheme);
themeToggleEl.onclick=()=>{const current=document.documentElement.getAttribute('data-theme')||'dark';setTheme(current==='dark'?'light':'dark');};
const toArray=v=>Array.isArray(v)?v:(v==null?[]:[v]);
const fmtDuration=ms=>{if(!ms||ms<=0)return '-';const t=Math.round(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return h>0?`${h}h ${m}m ${s}s`:`${m}m ${s}s`;};
const audioLabel=a=>{const p=[];if(a.lang)p.push(a.lang);if(a.codec)p.push(a.codec);if(a.channels)p.push(`${a.channels}ch`);return p.join(':');};
// Column definitions: id, label, optional, default-visible, sort-key-fn
const COLS=[
  {id:'filename',label:'Filename',opt:false,vis:true,sort:x=>x.filename.toLowerCase()},
  {id:'path',label:'Path',opt:true,vis:true,sort:x=>x.path.toLowerCase()},
  {id:'size',label:'Size GB',opt:false,vis:true,sort:x=>x.size},
  {id:'duration',label:'Duration',opt:true,vis:true,sort:x=>x.durationMs},
  {id:'video',label:'Video',opt:false,vis:true,sort:x=>x.codec},
  {id:'resolution',label:'Resolution',opt:true,vis:true,sort:x=>x.width},
  {id:'hdr',label:'HDR',opt:true,vis:true,sort:x=>x.hdr?1:0},
  {id:'audio',label:'Audio',opt:true,vis:true,sort:x=>x.audioArr.map(audioLabel).join(',').toLowerCase()},
  {id:'subtitles',label:'Subtitles',opt:true,vis:true,sort:x=>x.subArr.join(',').toLowerCase()},
  {id:'flags',label:'Flags',opt:true,vis:true,sort:x=>getFlags(x).map(f=>f.t).join(',')},
  {id:'hash',label:'Changed Key',opt:true,vis:false,sort:x=>x.hash},
];
let sortCol=null,sortDir=0;
let allVideoCodecs=[],allAudioCodecs=[],allExts=[],allMediaTypes=[];
const activeVideoCodecs=new Set(),activeAudioCodecs=new Set(),activeExts=new Set(),activeMediaTypes=new Set();
const visCol=id=>COLS.find(c=>c.id===id)?.vis;
const getFlags=x=>{
  const f=[];
  if(x.codec&&x.codec!=='hevc'&&x.codec!=='av1')f.push({t:'non-hevc',cls:'flag-warn'});
  if(x.width>0&&x.width<1280)f.push({t:'sd',cls:'flag-info'});
  const v=x.raw?.video;if(v&&v.bitrate>0&&x.durationMs>0){const bpx=v.bitrate/(x.width||1920);if(bpx<0.4)f.push({t:'low-bitrate',cls:'flag-warn'});}
  if(x.subArr.length===0)f.push({t:'no-subs',cls:'flag-info'});
  if(x.audioArr.length===1){const ch=Number(x.audioArr[0]?.channels||0);if(ch<=2)f.push({t:'mono/stereo',cls:'flag-info'});}
  return f;
};
const makeCards=items=>{const total=items.length,hdrCount=items.filter(x=>x.hdr).length,noSub=items.filter(x=>x.subArr.length===0).length,multiAudio=items.filter(x=>x.audioArr.length>1).length,avgSize=total?(items.reduce((a,b)=>a+b.size,0)/total/(1024**3)):0,totalHours=items.reduce((a,b)=>a+b.durationMs,0)/1000/3600;const cards=[['Total',total,'var(--text)'],['HDR',hdrCount,'var(--accent2)'],['No Subtitles',noSub,'var(--warn)'],['Multi-Audio',multiAudio,'var(--accent)'],['Avg Size (GB)',avgSize.toFixed(2),'var(--ok)'],['Total Hours',totalHours.toFixed(1),'var(--accent)']];cardsEl.innerHTML=cards.map(c=>`<div class="card"><div class="num" style="color:${c[2]};">${c[1]}</div><div class="lbl">${c[0]}</div></div>`).join('');};
const uniq=v=>[...new Set(v.filter(Boolean))].sort((a,b)=>a.localeCompare(b));
const deriveLibraryFromPath=path=>{const parts=String(path||'').split(/[/\\]+/).filter(Boolean);if(parts.length===0)return '(root)';const mediaIdx=parts.findIndex(p=>String(p).toLowerCase()==='media');if(mediaIdx>=0&&mediaIdx+1<parts.length)return parts[mediaIdx+1];if(parts.length>1&&/^[A-Za-z]:$/.test(parts[0]))return parts[1];return parts[0];};
const libraryLabel=v=>String(v||'').split(/\s+/).filter(Boolean).map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
const classifyMediaType=ext=>{const e=String(ext||'').toLowerCase();if(['.avi','.divx','.mkv','.mp4','.m4v','.m2ts','.mts','.mov','.mpg','.mpeg','.ts','.wmv','.flv','.webm','.3gp','.3g2','.vob','.f4v','.ogv','.rm','.rmvb','.asf'].includes(e))return 'video';if(['.mp3','.flac','.aac','.m4a','.ogg','.opus','.wav','.wma','.aiff','.aif','.alac','.ape','.wv','.mka','.dts','.ac3','.eac3','.dsf','.dff'].includes(e))return 'audio';if(['.jpg','.jpeg','.png','.gif','.bmp','.tiff','.tif','.webp','.heic','.heif','.raw','.cr2','.cr3','.nef','.arw','.dng','.orf','.rw2','.pef'].includes(e))return 'image';if(['.epub','.mobi','.azw','.azw3','.pdf','.cbz','.cbr','.cb7','.djvu'].includes(e))return 'ebook';if(['.srt','.ass','.ssa','.sub','.idx','.vtt','.sup'].includes(e))return 'subtitle';return 'other';};
const closeDetails=()=>{detailsOverlayEl.classList.add('hidden');document.body.style.overflow='';};
const openDetails=x=>{detailsTitleEl.textContent=x.filename||'Entry details';const items=[['Path',x.path],['Video codec',x.codec],['Audio',x.audioArr.map(audioLabel).filter(Boolean).join(', ')||'-'],['Subtitles',x.subArr.join(', ')||'-'],['Resolution',x.width>0?`${x.width}x${x.height}`:'-'],['HDR',x.hdr?'YES':'NO'],['Duration',fmtDuration(x.durationMs)],['Size (GB)',(x.size/(1024**3)).toFixed(2)],['Hash',x.hash||'-']];detailsGridEl.innerHTML='';for(const [k,v] of items){const kEl=document.createElement('div');kEl.className='details-k';kEl.textContent=k;const vEl=document.createElement('div');vEl.className='details-v mono';vEl.textContent=v;detailsGridEl.appendChild(kEl);detailsGridEl.appendChild(vEl);}detailsTagsEl.textContent=x.tags.length?x.tags.join('\n'):'-';detailsRawEl.textContent=JSON.stringify(x.raw,null,2);detailsOverlayEl.classList.remove('hidden');document.body.style.overflow='hidden';};
detailsCloseEl.onclick=closeDetails;
detailsOverlayEl.addEventListener('click',e=>{if(e.target===detailsOverlayEl)closeDetails();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!detailsOverlayEl.classList.contains('hidden'))closeDetails();});
(async()=>{
  let rawData;
  try {
    const res=await fetch('./metadata.ndjson');
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    rawData=text.trim().split('\n').filter(Boolean).map(l=>JSON.parse(l));
  } catch(err) {
    captionEl.textContent=`Cannot load metadata.ndjson \u2014 ${err.message}. Open via a local HTTP server (e.g. python -m http.server).`;
    return;
  }
  const norm=rawData.map(r=>{const path=String(r.path||'');const filename=path.split('\\').pop()||path;const ext=(filename.includes('.')?filename.slice(filename.lastIndexOf('.')).toLowerCase():'').trim();const audioArr=toArray(r.audio);const subArr=toArray(r.subtitles).filter(Boolean).map(s=>String(s));const tags=toArray(r.tags).map(t=>String(t));const video=r.video||{};const width=Number(video.width||0),height=Number(video.height||0);const library=String(r.library||'').trim()||deriveLibraryFromPath(path);const mediaType=classifyMediaType(ext);return{raw:r,path,filename,ext,library,mediaType,size:Number(r.size||0),durationMs:Number(r.duration||0),codec:String(video.codec||'n/a').toLowerCase(),width,height,hdr:Boolean(video.hdr),audioArr,subArr,tags,hash:String(r.hash||'')};});
  uniq(norm.map(x=>x.library)).forEach(lib=>{const o=document.createElement('option');o.value=lib;o.textContent=libraryLabel(lib);libraryEl.appendChild(o);});
  const setToggleState=(el,on)=>{el.classList.toggle('on',on);el.classList.toggle('off',!on);el.textContent=on?'● ON':'○ OFF';};
  const paintGroup=(container,set,getVal)=>{container.querySelectorAll('.filter-pill').forEach(p=>{const on=set.has(getVal(p));p.classList.toggle('on',on);p.classList.toggle('off',!on);});};
  const setGroupAll=(set,values,container,getVal,toggleEl,on)=>{set.clear();if(on)values.forEach(v=>set.add(v));paintGroup(container,set,getVal);setToggleState(toggleEl,set.size>0);};

  // Build VIDEO codec pills
  allVideoCodecs=uniq(norm.map(x=>x.codec));
  allVideoCodecs.forEach(c=>{const b=document.createElement('button');b.className='filter-pill off';b.type='button';b.textContent=c;b.dataset.codec=c;b.onclick=()=>{if(activeVideoCodecs.has(c))activeVideoCodecs.delete(c);else activeVideoCodecs.add(c);paintGroup(videoFiltersEl,activeVideoCodecs,p=>p.dataset.codec);setToggleState(videoToggleEl,activeVideoCodecs.size>0);render();};videoFiltersEl.appendChild(b);});
  // Build AUDIO codec pills
  allAudioCodecs=uniq(norm.flatMap(x=>x.audioArr.map(a=>String((a&&a.codec)||'').toLowerCase()).filter(Boolean)));
  allAudioCodecs.forEach(c=>{const b=document.createElement('button');b.className='filter-pill off';b.type='button';b.textContent=c;b.dataset.audioCodec=c;b.onclick=()=>{if(activeAudioCodecs.has(c))activeAudioCodecs.delete(c);else activeAudioCodecs.add(c);paintGroup(audioFiltersEl,activeAudioCodecs,p=>p.dataset.audioCodec);setToggleState(audioToggleEl,activeAudioCodecs.size>0);render();};audioFiltersEl.appendChild(b);});
  // Build EXT pills (containers)
  allExts=uniq(norm.map(x=>x.ext));
  allExts.forEach(e=>{const b=document.createElement('button');b.className='filter-pill off';b.type='button';b.textContent=e||'(none)';b.dataset.ext=e;b.onclick=()=>{if(activeExts.has(e))activeExts.delete(e);else activeExts.add(e);paintGroup(extFiltersEl,activeExts,p=>p.dataset.ext);setToggleState(extToggleEl,activeExts.size>0);render();};extFiltersEl.appendChild(b);});

  // Build media type pills
  allMediaTypes=uniq(norm.map(x=>x.mediaType));
  allMediaTypes.forEach(t=>{const b=document.createElement('button');b.className='filter-pill off';b.type='button';b.textContent=t;b.dataset.mediaType=t;b.onclick=()=>{if(activeMediaTypes.has(t))activeMediaTypes.delete(t);else activeMediaTypes.add(t);paintGroup(mediaTypeFiltersEl,activeMediaTypes,p=>p.dataset.mediaType);setToggleState(mediaTypeToggleEl,activeMediaTypes.size>0);render();};mediaTypeFiltersEl.appendChild(b);});

  videoToggleEl.onclick=()=>{setGroupAll(activeVideoCodecs,allVideoCodecs,videoFiltersEl,p=>p.dataset.codec,videoToggleEl,activeVideoCodecs.size===0);render();};
  audioToggleEl.onclick=()=>{setGroupAll(activeAudioCodecs,allAudioCodecs,audioFiltersEl,p=>p.dataset.audioCodec,audioToggleEl,activeAudioCodecs.size===0);render();};
  extToggleEl.onclick=()=>{setGroupAll(activeExts,allExts,extFiltersEl,p=>p.dataset.ext,extToggleEl,activeExts.size===0);render();};
  mediaTypeToggleEl.onclick=()=>{setGroupAll(activeMediaTypes,allMediaTypes,mediaTypeFiltersEl,p=>p.dataset.mediaType,mediaTypeToggleEl,activeMediaTypes.size===0);render();};

  const passes=x=>{const q=searchEl.value.trim().toLowerCase(),lib=libraryEl.value,hdr=hdrEl.value,minW=Number(minWidthEl.value||0);if(lib&&x.library!==lib)return false;if(q){const hay=[x.path,x.filename,x.codec,x.hash,x.tags.join(' '),x.subArr.join(' '),x.audioArr.map(audioLabel).join(' ')].join(' ').toLowerCase();if(!hay.includes(q))return false;}if(activeVideoCodecs.size>0&&!activeVideoCodecs.has(x.codec))return false;if(activeAudioCodecs.size>0&&!x.audioArr.some(a=>activeAudioCodecs.has(String((a&&a.codec)||'').toLowerCase())))return false;if(activeExts.size>0&&!activeExts.has(x.ext))return false;if(activeMediaTypes.size>0&&!activeMediaTypes.has(x.mediaType))return false;if(hdr==='yes'&&!x.hdr)return false;if(hdr==='no'&&x.hdr)return false;if(minW>0&&x.width<minW)return false;return true;};
  const buildHead=()=>{tableHeadEl.innerHTML='';COLS.filter(c=>c.vis).forEach(c=>{const th=document.createElement('th');th.textContent=c.label;if(c.sort){th.className='sortable';if(sortCol===c.id)th.classList.add(sortDir===1?'sort-asc':'sort-desc');th.addEventListener('click',()=>{if(sortCol===c.id){sortDir=sortDir===1?-1:sortDir===-1?0:1;}else{sortCol=c.id;sortDir=1;}if(sortDir===0)sortCol=null;buildHead();renderRows(norm.filter(passes));});}tableHeadEl.appendChild(th);});};
  const renderRows=filtered=>{rowsEl.innerHTML='';const sorted=sortCol?[...filtered].sort((a,b)=>{const col=COLS.find(c=>c.id===sortCol);const av=col.sort(a),bv=col.sort(b);return sortDir*(av<bv?-1:av>bv?1:0);}):filtered;const frag=document.createDocumentFragment();for(const x of sorted){const tr=document.createElement('tr');tr.className='row-click';tr.addEventListener('click',()=>openDetails(x));const audioText=x.audioArr.map(audioLabel).filter(Boolean).join(', '),subText=x.subArr.join(', ');const flags=getFlags(x);const cellMap={filename:['mono',x.filename],path:['muted mono',x.path],size:['mono',(x.size/(1024**3)).toFixed(2)],duration:['mono',fmtDuration(x.durationMs)],video:['tag',x.codec],resolution:['mono',x.width>0?`${x.width}x${x.height}`:'-'],hdr:[x.hdr?'hdr-yes mono':'hdr-no mono',x.hdr?'YES':'NO'],audio:['mono',audioText||'-'],subtitles:['mono',subText||'-'],hash:['muted mono',x.hash||'-'],flags:['',null]};COLS.filter(c=>c.vis).forEach(c=>{const td=document.createElement('td');if(c.id==='flags'){flags.forEach(f=>{const s=document.createElement('span');s.className='flag '+f.cls;s.textContent=f.t;td.appendChild(s);});if(!flags.length)td.textContent='-';}else{const [cls,val]=cellMap[c.id]||['',''];td.className=cls;td.textContent=val;}tr.appendChild(td);});frag.appendChild(tr);}rowsEl.appendChild(frag);};
  const render=()=>{const filtered=norm.filter(passes);makeCards(filtered);captionEl.textContent=`${filtered.length.toLocaleString()} of ${norm.length.toLocaleString()} entries`;buildHead();renderRows(filtered);};
  // Column chooser pills
  COLS.filter(c=>c.opt).forEach(c=>{const b=document.createElement('button');b.className='filter-pill'+(c.vis?'':' off');b.type='button';b.textContent=c.label;b.onclick=()=>{c.vis=!c.vis;b.classList.toggle('off',!c.vis);render();};colPillsEl.appendChild(b);});
  [libraryEl,searchEl,hdrEl,minWidthEl].forEach(el=>{el.addEventListener('input',render);el.addEventListener('change',render);});
  searchEl.addEventListener('input',()=>searchEl.closest('.search-wrap').classList.toggle('has-value',searchEl.value.length>0));
  searchClearEl.onclick=()=>{searchEl.value='';searchEl.closest('.search-wrap').classList.remove('has-value');render();};
  exportBtn.onclick=()=>{const filtered=norm.filter(passes);const csv='Filename,Path,Size (MB),Duration,Codec,Resolution,HDR\n'+filtered.map(x=>`"${x.filename}","${x.path}",${(x.size/1024/1024).toFixed(2)},${fmtDuration(x.durationMs)},${x.codec},${x.width}x${x.height},${x.hdr?'Yes':'No'}`).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='metadata_report.csv';a.click();URL.revokeObjectURL(url);};
  resetBtn.onclick=()=>{libraryEl.value='';searchEl.value='';hdrEl.value='';minWidthEl.value='';searchEl.closest('.search-wrap').classList.remove('has-value');setGroupAll(activeVideoCodecs,allVideoCodecs,videoFiltersEl,p=>p.dataset.codec,videoToggleEl,false);setGroupAll(activeAudioCodecs,allAudioCodecs,audioFiltersEl,p=>p.dataset.audioCodec,audioToggleEl,false);setGroupAll(activeExts,allExts,extFiltersEl,p=>p.dataset.ext,extToggleEl,false);setGroupAll(activeMediaTypes,allMediaTypes,mediaTypeFiltersEl,p=>p.dataset.mediaType,mediaTypeToggleEl,false);render();};
  render();
})();
</script>
</body>
</html>
